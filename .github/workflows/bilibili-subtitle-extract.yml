name: Extract Bilibili subtitles + auto distill

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: "Bilibili URL, b23.tv link, BV ID, or AV ID; separate multiple entries with newlines, spaces, or commas"
        required: true
        type: string
      enable_hardsub_ocr:
        description: "Enable hard subtitle OCR fallback"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  extract-and-distill:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      ARTIFACT_NAME: bilibili-subtitle-results-${{ github.run_id }}
      VIDEO_URLS: ${{ inputs.video_urls }}
      ENABLE_HARDSUB_OCR: ${{ inputs.enable_hardsub_ocr }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate workflow inputs
        shell: bash
        run: |
          set -euo pipefail
          raw="${VIDEO_URLS:-}"
          compact="$(printf '%s' "$raw" | tr -d '[:space:]')"
          echo "VIDEO_URLS characters: ${#raw}"
          echo "Requested hard-subtitle OCR: ${ENABLE_HARDSUB_OCR:-false}"
          if [[ -z "$compact" ]]; then
            echo "::error::video_urls is empty. Paste at least one Bilibili URL, BV ID, or AV ID."
            exit 2
          fi

      - name: Install FFmpeg
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          command -v ffmpeg
          ffmpeg -version

      - name: Install BBDown subtitle extractor
        shell: bash
        run: |
          set -euo pipefail
          BBDOWN_URL="$(python - <<'PY'
          import json, platform, urllib.request
          system = {"Linux": "linux", "Darwin": "osx"}.get(platform.system())
          machine = {"x86_64": "x64", "AMD64": "x64", "aarch64": "arm64", "arm64": "arm64"}.get(platform.machine())
          if not system or not machine:
              raise SystemExit(f"Unsupported runner: {platform.system()} {platform.machine()}")
          req = urllib.request.Request(
              "https://api.github.com/repos/nilaoda/BBDown/releases/latest",
              headers={"Accept": "application/vnd.github+json", "User-Agent": "bilibili-script-distiller"},
          )
          release = json.load(urllib.request.urlopen(req, timeout=30))
          candidates = [
              asset for asset in release.get("assets", [])
              if f"_{system}-{machine}." in asset.get("name", "")
          ]
          if not candidates:
              raise SystemExit(f"No BBDown release asset for {system}-{machine}")
          print(candidates[0]["browser_download_url"])
          PY
          )"
          mkdir -p "$RUNNER_TEMP/bbdown" "$HOME/.local/bin"
          curl --fail --location --retry 3 "$BBDOWN_URL" -o "$RUNNER_TEMP/bbdown/package"
          if unzip -t "$RUNNER_TEMP/bbdown/package" >/dev/null 2>&1; then
            unzip -q "$RUNNER_TEMP/bbdown/package" -d "$RUNNER_TEMP/bbdown/extracted"
          else
            mkdir -p "$RUNNER_TEMP/bbdown/extracted"
            tar -xf "$RUNNER_TEMP/bbdown/package" -C "$RUNNER_TEMP/bbdown/extracted"
          fi
          find "$RUNNER_TEMP/bbdown/extracted" -type f -name 'BBDown*' -exec cp {} "$HOME/.local/bin/BBDown" \; -quit
          chmod +x "$HOME/.local/bin/BBDown"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install OCR and distillation dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install rapidocr_onnxruntime pyyaml
          python - <<'PY'
          from rapidocr_onnxruntime import RapidOCR
          import yaml

          RapidOCR()
          print("RapidOCR ONNX import check: OK")
          print("PyYAML import check: OK")
          PY

      - name: Extract existing subtitles
        id: extract
        shell: bash
        env:
          OCR_START_TIME: ""
          OCR_END_TIME: ""
          OCR_SUBTITLE_POSITION: bottom
          OCR_LANGUAGE: ch
        run: |
          set -uo pipefail
          SCRIPT=".agents/skills/bilibili-script-distiller/scripts/github_actions_extract.py"
          if [[ ! -f "$SCRIPT" ]]; then
            echo "::error::Extractor script not found at $SCRIPT"
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          OCR_ARGS=()
          if [[ "${ENABLE_HARDSUB_OCR:-true}" == "true" ]]; then
            OCR_ARGS+=(--enable-hardsub-ocr)
          fi
          for pair in \
            "--start-time|$OCR_START_TIME" \
            "--end-time|$OCR_END_TIME"; do
            flag=${pair%%|*}
            value=${pair#*|}
            if [[ -n "$value" ]]; then
              OCR_ARGS+=("$flag" "$value")
            fi
          done

          set +e
          python "$SCRIPT" \
            --output-root references/bilibili \
            --summary-json "$RUNNER_TEMP/extraction-summary.json" \
            --subtitle-position "$OCR_SUBTITLE_POSITION" \
            --ocr-language "$OCR_LANGUAGE" \
            "${OCR_ARGS[@]}"
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run character evidence distillation
        id: distill
        shell: bash
        run: |
          set -uo pipefail
          SCRIPT=".agents/skills/bilibili-script-distiller/scripts/character_evidence_pipeline.py"
          if [[ ! -f "$SCRIPT" ]]; then
            echo "::error::Distillation script not found at $SCRIPT"
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          set +e
          python "$SCRIPT" --project-root .
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit extracted and distilled results
        id: publish
        shell: bash
        run: |
          set -uo pipefail
          paths=()
          [[ -d references/bilibili ]] && paths+=(references/bilibili)
          [[ -d references/characters ]] && paths+=(references/characters)
          [[ -d references/distilled ]] && paths+=(references/distilled)

          if [[ ${#paths[@]} -eq 0 ]]; then
            echo "mode=artifact" >> "$GITHUB_OUTPUT"
            echo "reason=no result directories were produced" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add -- "${paths[@]}"
          if git diff --cached --quiet; then
            echo "mode=none" >> "$GITHUB_OUTPUT"
            echo "reason=no new or changed extraction/distillation results" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Add extracted subtitles and character evidence"
          if git push; then
            echo "mode=commit" >> "$GITHUB_OUTPUT"
            echo "reason=results committed to repository" >> "$GITHUB_OUTPUT"
          else
            echo "mode=artifact" >> "$GITHUB_OUTPUT"
            echo "reason=repository write permission or branch protection prevented push" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload results Artifact when commit is unavailable
        if: steps.publish.outputs.mode == 'artifact'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            references/bilibili/
            references/characters/
            references/distilled/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload OCR speaker debug Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-ocr-speaker-debug-${{ github.run_id }}
          path: ${{ runner.temp }}/bilibili-ocr-debug/
          if-no-files-found: ignore
          retention-days: 7

      - name: Write run summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Bilibili subtitle extraction + character evidence"
            echo
            if [[ -f "$RUNNER_TEMP/extraction-summary.json" ]]; then
              python - "$RUNNER_TEMP/extraction-summary.json" <<'PY'
          import json, sys
          data = json.load(open(sys.argv[1], encoding="utf-8"))
          print(f"- Processed: {data.get('processed', 0)}")
          print(f"- Successful: {data.get('successful', 0)}")
          print(f"- Failed: {data.get('failed', 0)}")
          for item in data.get("items", []):
              mark = "✅" if item.get("success") else "❌"
              mode = item.get("source_type", "unknown")
              print(f"- {mark} `{item.get('input', '')}` — {mode}: {item.get('video_id') or item.get('failure_reason') or 'unknown'}")
          PY
            fi
            echo "- Extraction exit code: ${{ steps.extract.outputs.exit_code || 'unknown' }}"
            echo "- Distillation exit code: ${{ steps.distill.outputs.exit_code || 'unknown' }}"
            echo "- Save mode: ${{ steps.publish.outputs.mode || 'unknown' }}"
            echo "- Details: ${{ steps.publish.outputs.reason || 'not available' }}"
            if [[ "${{ steps.publish.outputs.mode }}" == "artifact" ]]; then
              echo "- Artifact: \`$ARTIFACT_NAME\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail workflow when all inputs failed
        if: always() && steps.extract.outputs.exit_code != '0'
        shell: bash
        run: |
          echo "::error::All subtitle extractions failed"
          exit 1

      - name: Fail workflow when distillation failed
        if: always() && steps.distill.outputs.exit_code != '0'
        shell: bash
        run: |
          echo "::error::Character evidence distillation failed; extracted subtitles were still preserved"
          exit 1
